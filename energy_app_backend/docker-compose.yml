version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: energyiq_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: energyiq_db
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - energyiq-network

  backend:
    build: .
    container_name: energyiq_backend
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://admin:admin123@mongodb:27017/energyiq_db?authSource=admin
      DATABASE_NAME: energyiq_db
      ENVIRONMENT: development
      DEBUG: "True"
      SECRET_KEY: your-super-secret-key-change-this-in-production
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - energyiq-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: MongoDB GUI (mongo-express)
  mongo-express:
    image: mongo-express:latest
    container_name: energyiq_mongo_express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb
    networks:
      - energyiq-network

volumes:
  mongo_data:
  mongo_config:

networks:
  energyiq-network:
    driver: bridge
