name: energy_app
description: IoT Energy Monitoring and Device Management Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # State Management
  flutter_riverpod: ^2.4.9

  # Routing
  go_router: ^13.2.0

  # Storage
  flutter_secure_storage: ^9.0.0

  # Charts
  fl_chart: ^0.67.0

  # UI
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  lottie: ^3.1.0
  percent_indicator: ^4.2.3
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  timeago: ^3.6.1

  # Icons
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
